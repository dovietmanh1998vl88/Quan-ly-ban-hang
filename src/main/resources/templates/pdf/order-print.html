<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <style>
      * {
        font-family: "Roboto";
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      table,
      th,
      td {
        border: 1px solid black;
      }

      th,
      td {
        padding: 8px;
      }
      .payment-table {
        width: 100%;
        margin-top: 10px;
        border: none;
      }

      .payment-table td {
        border: none;
        vertical-align: top;
        padding: 5px;
      }
    </style>
  </head>

  <body>
    <h1>HÓA ĐƠN BÁN HÀNG</h1>

    <p>
      Mã đơn:
      <span th:text="${order.orderCode}"></span>
    </p>

    <p>
      Khách hàng:
      <span th:text="${order.customerName}"></span>
    </p>

    <p>
      SĐT:
      <span>0987.968.668</span>
    </p>

    <p>
      Địa chỉ:
      <span>Hoàn Kiếm Hà Nội</span>
    </p>

    <table>
      <thead>
        <tr>
          <th>Sản phẩm</th>
          <th>Số lượng</th>
          <th>Giá</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="item : ${order.items}">
          <td th:text="${item.productName}"></td>
          <td th:text="${item.quantity}"></td>
          <td th:text="${item.price}"></td>
        </tr>
      </tbody>
    </table>

    <table class="payment-table">
      <tr>
        <td width="40%">
          <p>Ngân hàng: MB BANK</p>
          <p>STK: 123456789</p>
          <p>Chủ TK: VM POST</p>

          <p>
            Số tiền:
            <span
              th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')}"
            >
            </span>
          </p>
        </td>

        <td width="60%" style="text-align: center">
          <img th:src="|data:image/png;base64,${qrBase64}|" width="200" />
        </td>
      </tr>
    </table>
  </body>
</html>
