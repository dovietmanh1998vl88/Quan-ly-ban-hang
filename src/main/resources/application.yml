server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shop_management}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
  # OAuth2 Resource Server — validate token từ Keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          # Spring tự download public key từ endpoint này để verify token
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:shop}
keycloak:
  realm: ${KEYCLOAK_REALM:shop}
  url: ${KEYCLOAK_URL:http://localhost:8180}
  client-id: shop-app
  client-secret: ${KEYCLOAK_CLIENT_SECRET:paste-secret-here}


logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE

jwt:
  secret: ${JWT_SECRET:mysupersecretkeymysupersecretkey123456}
  expiration: ${JWT_EXPIRATION:86400000}