server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shop_management
    username: root
    password: 123456

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

jwt:
  secret: your-secret-key
  expiration: 86400000