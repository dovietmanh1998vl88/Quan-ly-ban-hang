# docker-compose.dev.yml
version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: shop_mysql_dev
    environment:
      MYSQL_DATABASE: shop_management
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456" ]
      interval: 10s
      timeout: 5s
      retries: 5

    # MySQL riêng cho Keycloak — tách biệt hoàn toàn
  mysql_keycloak:
    image: mysql:8.0
    container_name: shop_mysql_keycloak
    environment:
      MYSQL_DATABASE: keycloak
      MYSQL_ROOT_PASSWORD: keycloak123
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: keycloak123
    ports:
      - "3307:3306"     # port khác để không conflict
    volumes:
      - mysql_keycloak_data:/var/lib/mysql   # ← persist data
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pkeycloak123" ]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: shop_keycloak
    #    command: start-dev
    # Thêm --import-realm vào command
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      #      # Keycloak dùng H2 in-memory cho dev — không cần DB riêng
      #      KC_DB: dev-mem
      #      KC_HTTP_PORT: 8180

      # Kết nối MySQL thay vì dev-mem
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql_keycloak:3306/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123

      KC_HTTP_PORT: 8180
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8180:8180"
    volumes:
      # Mount folder realm vào đúng chỗ Keycloak đọc
      - ./keycloak:/opt/keycloak/data/import
    depends_on:

      mysql_keycloak:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8180/health/ready || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123456
      MINIO_BUCKET: imports
    command: server /data --console-address ":9001"

    volumes:
      - minio_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev      # ← dùng Dockerfile dev
    container_name: shop_app_dev
    ports:
      - "8080:8080"
      - "35729:35729"                 # LiveReload port của DevTools
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/shop_management
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
      JWT_SECRET: mysupersecretkeymysupersecretkey123456
      JWT_EXPIRATION: 86400000
      # Keycloak config — app dùng để validate token
      KEYCLOAK_URL: http://keycloak:8180
      KEYCLOAK_REALM: shop
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/shop  # ← khớp với token
    volumes:
      # Mount toàn bộ source code từ máy host vào container
      # Khi bạn sửa file → container thấy ngay
      - .:/app
      # Giữ lại Maven cache — không download lại dependency mỗi lần
      - maven_cache:/root/.m2
    depends_on:
      mysql:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  mysql_dev_data:
  mysql_keycloak_data:
  maven_cache:                        # ← cache Maven giữa các lần restart
  minio_data: